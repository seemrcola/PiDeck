name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-changelog:
    name: Extract changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          # 从 tag 名提取版本号（去掉 v 前缀）
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for v${VERSION}..."
          
          # 提取该版本的 changelog 内容（从版本标题到下一个版本标题之间）
          # 优先使用中文 CHANGELOG
          BODY=$(awk -v ver="v${VERSION}" '/^## v[0-9]/{if(found) exit; if($2==ver) found=1; next} found{print}' CHANGELOG.zh-CN.md)
          if [ -z "$BODY" ]; then
            BODY=$(awk -v ver="v${VERSION}" '/^## v[0-9]/{if(found) exit; if($2==ver) found=1; next} found{print}' CHANGELOG.md)
          fi
          
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi
          
          # 使用 EOF 标记输出多行内容
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "--- Changelog preview ---"
          echo "$BODY"
          echo "------------------------"

  build-release:
    name: Build ${{ matrix.platform }} packages
    needs: extract-changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run build && npx electron-builder --win nsis portable zip --publish never
            electron_builder_binaries_mirror: https://npmmirror.com/mirrors/electron-builder-binaries/
          - platform: macos
            os: macos-latest
            command: npm run build && npx electron-builder --mac dmg zip --publish never
            electron_builder_binaries_mirror: ""
          - platform: linux
            os: ubuntu-latest
            command: npm run build && npx electron-builder --linux AppImage deb tar.gz --publish never
            electron_builder_binaries_mirror: https://npmmirror.com/mirrors/electron-builder-binaries/

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build packages
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub Releases occasionally returns 504 for Electron/electron-builder binaries;
          # use a stable mirror for CI downloads while keeping publishing on GitHub Releases.
          # macOS DMG packaging needs dmgbuild bundles that can be missing from npmmirror,
          # so the matrix intentionally leaves the builder binaries mirror empty for macOS.
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: ${{ matrix.electron_builder_binaries_mirror }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.extract-changelog.outputs.release_body }}
          files: |
            release/*.exe
            release/*.msi
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest*.yml
